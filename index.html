<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cronograma</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f2f1ed;--surface:#fff;--border:#ddd;
      --text:#1a1a18;--muted:#6b6860;
      --accent:#185FA5;--accent-light:#E6F1FB;
      --hbg:#185FA5;--htxt:#fff;
      --row-alt:#f9f8f5;--shadow:0 1px 4px rgba(0,0,0,.08);
      --green:#1a7a3a;--green-light:#e6f5ec;
      --red:#a32d2d;--red-light:#fde8e8;
    }
    body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* HEADER */
    header{background:var(--hbg);color:var(--htxt);padding:1rem 2rem .8rem;display:flex;align-items:flex-end;gap:1rem}
    header h1{font-size:1.4rem;font-weight:normal;letter-spacing:.05em;font-family:'Courier New',monospace;text-transform:uppercase}
    header span{font-size:.78rem;opacity:.65;font-family:'Courier New',monospace;padding-bottom:1px}

    /* TABS */
    .tabs-bar{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 2rem}
    .tab-btn{padding:.75rem 1.35rem;border:none;background:#eae8e3;color:var(--muted);font-family:'Courier New',monospace;font-size:.76rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-right:1px solid var(--border);border-top:3px solid transparent;position:relative;top:1px;transition:background .15s}
    .tab-btn:first-child{border-left:1px solid var(--border)}
    .tab-btn.active{background:#fff;color:var(--accent);border-top:3px solid var(--accent);font-weight:bold}
    .tab-btn:hover:not(.active){background:#ddd}
    .tab-content{display:none;padding:1.2rem 1.5rem 3rem}
    .tab-content.active{display:block}

    /* TOOLBAR */
    .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.45rem;margin-bottom:.9rem;padding:.55rem .8rem;background:#fff;border:1px solid var(--border);border-radius:6px}
    .toolbar label{font-family:'Courier New',monospace;font-size:.73rem;color:var(--muted)}
    .toolbar select,.toolbar input[type=number]{font-family:'Courier New',monospace;font-size:.76rem;padding:.26rem .42rem;border:1px solid var(--border);border-radius:4px;background:#fff}
    .btn{display:inline-flex;align-items:center;gap:.28rem;padding:.32rem .8rem;border:none;border-radius:4px;font-family:'Courier New',monospace;font-size:.73rem;letter-spacing:.03em;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
    .btn:active{transform:scale(.97)}
    .btn-blue{background:var(--accent);color:#fff}.btn-blue:hover{opacity:.88}
    .btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.88}
    .btn-purple{background:#6a3fa0;color:#fff}.btn-purple:hover{opacity:.88}
    .btn-red{background:#b52020;color:#fff}.btn-red:hover{opacity:.88}
    .badge{display:inline-block;padding:.12rem .38rem;border-radius:3px;font-size:.67rem;font-family:'Courier New',monospace}
    .badge-ok{background:var(--green-light);color:var(--green)}
    .badge-err{background:var(--red-light);color:var(--red)}

    /* COBERTURA */
    .cover-bar{display:flex;flex-wrap:wrap;align-items:center;gap:.5rem;margin-bottom:.9rem;padding:.45rem .8rem;background:#fffbe6;border:1px solid #e0c060;border-radius:5px;font-family:'Courier New',monospace;font-size:.73rem;color:#5a4200}
    .cover-bar label{display:flex;align-items:center;gap:.25rem}
    .cover-bar input[type=number]{width:42px;padding:.2rem .28rem;border:1px solid #ccc;border-radius:3px;font-family:'Courier New',monospace;font-size:.73rem;text-align:center}

    /* LEGEND */
    .legend{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.85rem;font-family:'Courier New',monospace;font-size:.68rem}
    .leg{padding:.12rem .38rem;border-radius:3px;border:1px solid #ddd;background:#fff;color:var(--text)}
    .leg-F{background:#444;color:#fff;border-color:#444}
    .leg-N{background:#ccc;color:#222;border-color:#bbb}

    /* TABLE */
    .table-wrapper{overflow-x:auto;border-radius:6px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:1.5rem}
    table{border-collapse:collapse;min-width:100%;background:#fff;font-size:.77rem}
    thead th{background:var(--hbg);color:#fff;padding:.4rem .42rem;text-align:center;font-family:'Courier New',monospace;font-weight:normal;border-right:1px solid rgba(255,255,255,.15);white-space:nowrap;min-width:33px}
    thead th:first-child{text-align:left;min-width:145px;padding-left:.75rem}
    tbody td{padding:.3rem .38rem;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);white-space:nowrap;min-width:33px}
    tbody td:first-child{text-align:left;font-family:'Courier New',monospace;font-size:.74rem;padding-left:.65rem;font-weight:bold;background:#f0efe9;position:sticky;left:0;z-index:1;border-right:2px solid var(--border);min-width:145px}
    tbody tr:nth-child(even) td:not(.cell-F):not(.cell-N){background:var(--row-alt)}
    tbody tr:nth-child(even) td:first-child{background:#ebe9e2}
    .cell-F{background:#444!important;color:#fff!important;font-weight:bold}
    .cell-N{background:#ccc!important;color:#222!important;font-weight:bold}
    [contenteditable="true"]{outline:none;cursor:text}
    [contenteditable="true"]:focus{outline:2px solid #f0c040!important;outline-offset:-2px;background:#fffbe6!important}
    thead th[contenteditable="true"]:focus{background:#1045a0!important}
    .day-header{display:flex;flex-direction:column;align-items:center;line-height:1.2}
    .day-num{font-size:.78rem;font-weight:bold}
    .day-letter{font-size:.62rem;opacity:.8}
    .add-row-row td{background:#f5f4ef!important;text-align:center!important;padding:.16rem}
    .btn-add-row{background:none;border:1px dashed #bbb;border-radius:3px;color:var(--muted);font-size:.7rem;font-family:'Courier New',monospace;padding:.16rem .55rem;cursor:pointer;width:100%}
    .btn-add-row:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}

    /* CONFIG PANEL */
    .cfg-panel{background:#fff;border:1px solid var(--border);border-radius:6px;padding:.9rem 1.1rem;margin-bottom:1.2rem}
    .cfg-panel h3{font-family:'Courier New',monospace;font-size:.78rem;color:var(--accent);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.75rem;border-bottom:1px solid var(--border);padding-bottom:.38rem}
    .cfg-table{width:100%;border-collapse:collapse;font-size:.74rem}
    .cfg-table th{background:#f0efe9;padding:.32rem .45rem;font-family:'Courier New',monospace;font-weight:normal;font-size:.68rem;color:var(--muted);border:1px solid var(--border);text-align:left;white-space:nowrap}
    .cfg-table td{padding:.28rem .4rem;border:1px solid var(--border);vertical-align:middle}
    .cfg-table td:first-child{font-weight:bold;font-family:'Courier New',monospace;background:#f9f8f5;min-width:130px;font-size:.73rem}
    .cfg-table select{font-family:'Courier New',monospace;font-size:.72rem;padding:.2rem .3rem;border:1px solid var(--border);border-radius:3px;background:#fff;cursor:pointer;width:100%}
    .cfg-table input[type=text]{font-family:'Courier New',monospace;font-size:.7rem;padding:.2rem .32rem;border:1px solid var(--border);border-radius:3px;width:110px}
    .partial-days{display:none;margin-top:.25rem}
    .partial-days input{width:110px}
    /* priority row colors */
    .row-titular td:first-child{border-left:3px solid #185FA5}
    .row-sup1 td:first-child{border-left:3px solid #6a3fa0}
    .row-sup2 td:first-child{border-left:3px solid #b55a00}

    /* multi-select turnos */
    .turn-checks{display:flex;flex-wrap:wrap;gap:.2rem}
    .turn-checks label{display:inline-flex;align-items:center;gap:.18rem;font-family:'Courier New',monospace;font-size:.68rem;cursor:pointer;padding:.1rem .25rem;border:1px solid #ddd;border-radius:3px;background:#f9f9f9}
    .turn-checks label:hover{background:var(--accent-light)}
    .turn-checks input{cursor:pointer;width:12px;height:12px}

    /* loading */
    .loading,.msg-error{padding:2.5rem 2rem;text-align:center;font-family:'Courier New',monospace;font-size:.83rem;color:var(--muted)}
    .msg-error{color:var(--red)}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #B5D4F4;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* confirm modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:8px;padding:1.5rem 2rem;max-width:340px;text-align:center;font-family:'Courier New',monospace;font-size:.82rem;box-shadow:0 4px 20px rgba(0,0,0,.2)}
    .modal-box h4{font-size:.95rem;margin-bottom:.6rem;color:var(--red)}
    .modal-box p{margin-bottom:1.1rem;color:var(--muted);font-size:.77rem}
    .modal-btns{display:flex;gap:.6rem;justify-content:center}

    @media(max-width:640px){
      .tab-content{padding:.7rem .35rem 2rem}
      .toolbar,.cover-bar{gap:.3rem}
    }
  </style>
</head>
<body>

<header>
  <h1>Cronograma</h1>
  <span>gestión de personal</span>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('current',this)">Mes en curso</button>
  <button class="tab-btn"        onclick="switchTab('next',this)">Mes entrante</button>
</div>

<div id="tab-current" class="tab-content active"></div>
<div id="tab-next"    class="tab-content"></div>

<!-- Confirm modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <h4>⚠ Vaciar cronograma</h4>
    <p>Esto va a borrar todos los turnos asignados.<br>Los nombres y la cabecera se mantienen.<br><br>¿Confirmás?</p>
    <div class="modal-btns">
      <button class="btn btn-red"  id="modal-confirm">Sí, vaciar</button>
      <button class="btn btn-blue" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzP-qBzVytXwMXTU67z8i4MFUYENUvtVOgoBicXOv-b1-zGi4QgvoKj9gdu_jHJZEhg/exec";
const MESES=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
const DIAS=["D","L","MA","MI","J","V","S"];
const ALL_TURNS=["M","T","N","F","RM","RT","-"];
const PRIORITIES=["Titular","Suplente 1","Suplente 2"];

const calState={current:null,next:null};
const cfgState={current:[],next:[]};
const loaded={};
let cbN=0, pendingClearTab=null;

/* ── JSONP ── */
function jsonp(params,cb){
  const name="__cb"+(++cbN);
  const qs=Object.entries(params).map(([k,v])=>k+"="+encodeURIComponent(v)).join("&");
  const to=setTimeout(()=>{cb({error:"Timeout"});delete window[name];},25000);
  window[name]=d=>{clearTimeout(to);delete window[name];cb(d);};
  const s=document.createElement("script");
  s.src=API+"?"+qs+"&callback="+name;
  s.onerror=()=>{clearTimeout(to);cb({error:"Error de red"});delete window[name];};
  document.head.appendChild(s);
}

/* ── TABS ── */
function switchTab(tab,btn){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
  if(!loaded[tab]) loadTab(tab);
}
function setHtml(tab,html){document.getElementById("tab-"+tab).innerHTML=html;}

function loadTab(tab){
  loaded[tab]=true;
  setHtml(tab,'<div class="loading"><span class="spinner"></span>Cargando...</div>');
  let calDone=false,cfgDone=false;
  jsonp({action:"read",tab},json=>{
    if(!json.error) calState[tab]=json.data;
    calDone=true; if(cfgDone) render(tab);
  });
  jsonp({action:"readConfig",tab},json=>{
    if(!json.error&&json.config) cfgState[tab]=json.config;
    cfgDone=true; if(calDone) render(tab);
  });
}

/* ── RENDER ── */
function render(tab){
  const now=new Date();
  const defM=tab==="next"?(now.getMonth()+1)%12:now.getMonth();
  const defY=tab==="next"&&now.getMonth()===11?now.getFullYear()+1:now.getFullYear();

  let html=`
  <div class="toolbar">
    <label>Mes:</label>
    <select id="sel-m-${tab}">${MESES.map((m,i)=>`<option value="${i}"${i===defM?" selected":""}>${m}</option>`).join("")}</select>
    <label>Año:</label>
    <input type="number" id="sel-y-${tab}" value="${defY}" min="2020" max="2099" style="width:66px">
    <button class="btn btn-blue"   onclick="doInitMonth('${tab}')">⚙ Generar mes</button>
    <button class="btn btn-purple" onclick="doAutoFill('${tab}')">🔀 Distribuir turnos</button>
    <button class="btn btn-green"  onclick="doSave('${tab}')">💾 Guardar cambios</button>
    <button class="btn btn-red"    onclick="askClear('${tab}')">🗑 Vaciar cronograma</button>
    <span id="status-${tab}"></span>
  </div>
  <div class="cover-bar">
    <strong>Cobertura/día:</strong>
    <label>M:<input type="number" id="cov-M-${tab}"  value="3" min="1" max="20"></label>
    <label>T:<input type="number" id="cov-T-${tab}"  value="3" min="1" max="20"></label>
    <label>N:<input type="number" id="cov-N-${tab}"  value="4" min="1" max="20"></label>
    <label>RM:<input type="number" id="cov-RM-${tab}" value="1" min="0" max="10"></label>
    <label>RT:<input type="number" id="cov-RT-${tab}" value="1" min="0" max="10"></label>
  </div>`;

  html+=`<div class="legend">
    <span class="leg leg-F">F — Franco</span>
    <span class="leg leg-N">N — Noche</span>
    <span class="leg">M — Mañana</span>
    <span class="leg">T — Tarde</span>
    <span class="leg">RM — Ref. Mañana</span>
    <span class="leg">RT — Ref. Tarde</span>
    <span class="leg">— — No disponible</span>
  </div>`;

  html+=buildTable(tab,calState[tab]);
  html+=buildCfgPanel(tab);
  document.getElementById("tab-"+tab).innerHTML=html;
}

/* ── BUILD TABLE ── */
function buildTable(tab,rows){
  if(!rows||rows.length===0) return '<div class="msg-error">Sin datos. Usá "Generar mes" para inicializar.</div>';
  const header=rows[0];
  const monthYear=String(header[0]||"").trim();
  let numDays=0;
  for(let c=1;c<header.length;c++){if(String(header[c]||"").trim()==="")break;numDays++;}

  let t=`<div class="table-wrapper"><table><thead><tr>`;
  t+=`<th contenteditable="true" data-tab="${tab}" data-r="0" data-c="0" onblur="cellEdit(this)">${esc(monthYear)}</th>`;
  for(let c=1;c<=numDays;c++){
    const raw=String(header[c]||"").trim();
    const parts=raw.split(/\n|\r/);
    t+=`<th contenteditable="true" data-tab="${tab}" data-r="0" data-c="${c}" onblur="cellEdit(this)">
      <div class="day-header">
        <span class="day-num">${esc(parts[0]||"")}</span>
        ${parts[1]?`<span class="day-letter">${esc(parts[1])}</span>`:""}
      </div></th>`;
  }
  t+=`</tr></thead><tbody>`;

  for(let r=1;r<rows.length;r++){
    const name=String(rows[r][0]||"").trim();
    if(name===""&&rows[r].slice(1).every(v=>String(v).trim()==="")) continue;
    t+=`<tr>`;
    t+=`<td contenteditable="true" data-tab="${tab}" data-r="${r}" data-c="0" onblur="cellEdit(this)">${esc(name)}</td>`;
    for(let c=1;c<=numDays;c++){
      const val=String(rows[r][c]!==undefined?rows[r][c]:"").trim().toUpperCase();
      t+=`<td contenteditable="true" class="${cellCls(val)}" data-tab="${tab}" data-r="${r}" data-c="${c}" onblur="cellEditTurn(this)">${esc(val)}</td>`;
    }
    t+=`</tr>`;
  }
  t+=`<tr class="add-row-row"><td colspan="${numDays+1}">
    <button class="btn-add-row" onclick="addEmployee('${tab}')">+ Agregar empleado</button>
  </td></tr>`;
  t+=`</tbody></table></div>`;
  return t;
}

function cellCls(v){
  if(v==="F") return "cell-F";
  if(v==="N") return "cell-N";
  return "";
}

/* ── BUILD CONFIG PANEL ── */
function buildCfgPanel(tab){
  const names=getNames(tab);
  const cfgMap={};
  (cfgState[tab]||[]).forEach(c=>{cfgMap[c.name]=c;});

  const priorityOrder={"Titular":0,"Suplente 1":1,"Suplente 2":2};
  const sorted=[...names].sort((a,b)=>{
    const pa=priorityOrder[(cfgMap[a]||{}).priority]??99;
    const pb=priorityOrder[(cfgMap[b]||{}).priority]??99;
    return pa-pb;
  });

  let html=`<div class="cfg-panel">
  <h3>⚙ Configuración de empleados</h3>
  <div style="overflow-x:auto">
  <table class="cfg-table">
    <thead><tr>
      <th>Empleado</th>
      <th>Disponibilidad</th>
      <th>Prioridad</th>
      <th>Turnos disponibles</th>
    </tr></thead><tbody id="cfg-body-${tab}">`;

  sorted.forEach(name=>{
    const c=cfgMap[name]||{name,availability:"Disponible",partialDays:"",priority:"Titular",turnTypes:""};
    const pClass=c.priority==="Titular"?"row-titular":c.priority==="Suplente 1"?"row-sup1":"row-sup2";
    const selTurns=(c.turnTypes||"").split(",").map(s=>s.trim()).filter(Boolean);
    const showPartial=c.availability==="Disponibilidad parcial"?"block":"none";

    const availSel=["Disponible","Disponibilidad parcial","No disponible"].map(o=>
      `<option${o===c.availability?" selected":""}>${o}</option>`).join("");
    const prioSel=PRIORITIES.map(o=>
      `<option${o===c.priority?" selected":""}>${o}</option>`).join("");
    const turnChks=ALL_TURNS.map(t=>
      `<label><input type="checkbox" class="chk-turn" data-name="${esc(name)}" data-tab="${tab}" value="${t}"${selTurns.includes(t)?" checked":""}>${t}</label>`
    ).join("");

    html+=`<tr class="${pClass}" data-name="${esc(name)}">
      <td>${esc(name)}</td>
      <td>
        <select class="cfg-avail" data-name="${esc(name)}" data-tab="${tab}" onchange="togglePartial(this)">
          ${availSel}
        </select>
        <div class="partial-days" id="partial-${tab}-${esc(name).replace(/\s/g,'_')}" style="display:${showPartial}">
          <input type="text" class="cfg-partial" data-name="${esc(name)}" data-tab="${tab}" value="${esc(c.partialDays)}" placeholder="ej: 5,12,20">
        </div>
      </td>
      <td>
        <select class="cfg-prio" data-name="${esc(name)}" data-tab="${tab}" onchange="updateRowClass(this)">
          ${prioSel}
        </select>
      </td>
      <td><div class="turn-checks">${turnChks}</div></td>
    </tr>`;
  });

  html+=`</tbody></table></div>
  <div style="margin-top:.6rem;display:flex;gap:.5rem;align-items:center">
    <button class="btn btn-green" onclick="saveCfg('${tab}')">💾 Guardar configuración</button>
    <span id="cfg-status-${tab}"></span>
  </div></div>`;
  return html;
}

function togglePartial(sel){
  const name=sel.dataset.name, tab=sel.dataset.tab;
  const id="partial-"+tab+"-"+name.replace(/\s/g,"_");
  const div=document.getElementById(id);
  if(div) div.style.display=sel.value==="Disponibilidad parcial"?"block":"none";
}

function updateRowClass(sel){
  const tr=sel.closest("tr");
  if(!tr) return;
  tr.classList.remove("row-titular","row-sup1","row-sup2");
  if(sel.value==="Titular") tr.classList.add("row-titular");
  else if(sel.value==="Suplente 1") tr.classList.add("row-sup1");
  else tr.classList.add("row-sup2");
}

/* ── CELL EDIT ── */
function cellEdit(el){
  const tab=el.dataset.tab,r=parseInt(el.dataset.r),c=parseInt(el.dataset.c);
  ensureCell(tab,r,c);
  calState[tab][r][c]=el.innerText.trim();
}
function cellEditTurn(el){
  const tab=el.dataset.tab,r=parseInt(el.dataset.r),c=parseInt(el.dataset.c);
  const val=el.innerText.trim().toUpperCase();
  ensureCell(tab,r,c);
  calState[tab][r][c]=val;
  el.className=cellCls(val);
}
function ensureCell(tab,r,c){
  if(!calState[tab]) calState[tab]=[];
  while(calState[tab].length<=r) calState[tab].push([]);
  while(calState[tab][r].length<=c) calState[tab][r].push("");
}
function addEmployee(tab){
  if(!calState[tab]||!calState[tab].length) return;
  const cols=calState[tab][0].length;
  const row=new Array(cols).fill(""); row[0]="Nuevo empleado";
  calState[tab].push(row);
  render(tab);
  const tds=document.querySelectorAll(`#tab-${tab} tbody tr:not(.add-row-row):last-child td`);
  if(tds[0]){tds[0].focus();selAll(tds[0]);}
}

/* ── INIT MONTH ── */
function doInitMonth(tab){
  const month=parseInt(document.getElementById("sel-m-"+tab).value);
  const year =parseInt(document.getElementById("sel-y-"+tab).value);
  setStatus(tab,"⏳ Generando...","");
  jsonp({action:"initMonth",tab,month,year},json=>{
    if(json.error){setStatus(tab,"✗ "+json.error,"badge-err");return;}
    calState[tab]=json.data;
    render(tab);
    setStatus(tab,"✓ Mes generado","badge-ok");
  });
}

/* ── CLEAR ── */
function askClear(tab){
  pendingClearTab=tab;
  document.getElementById("confirm-modal").classList.add("open");
  document.getElementById("modal-confirm").onclick=()=>{
    closeModal();
    doClear(pendingClearTab);
  };
}
function closeModal(){document.getElementById("confirm-modal").classList.remove("open");}
function doClear(tab){
  setStatus(tab,"⏳ Vaciando...","");
  jsonp({action:"clearShifts",tab},json=>{
    if(json.error){setStatus(tab,"✗ "+json.error,"badge-err");return;}
    calState[tab]=json.data;
    render(tab);
    setStatus(tab,"✓ Cronograma vaciado","badge-ok");
  });
}

/* ── AUTO FILL ── */
function doAutoFill(tab){
  syncTable(tab);
  if(!calState[tab]||calState[tab].length<2){setStatus(tab,"Sin datos","badge-err");return;}

  const covM =parseInt(document.getElementById("cov-M-"+tab).value)||3;
  const covT =parseInt(document.getElementById("cov-T-"+tab).value)||3;
  const covN =parseInt(document.getElementById("cov-N-"+tab).value)||4;
  const covRM=parseInt(document.getElementById("cov-RM-"+tab).value)||1;
  const covRT=parseInt(document.getElementById("cov-RT-"+tab).value)||1;

  // Build config map from DOM
  const cfgMap={};
  readCfgFromDOM(tab).forEach(c=>{cfgMap[c.name]=c;});

  const header=calState[tab][0];
  let numDays=0;
  for(let c=1;c<header.length;c++){if(String(header[c]||"").trim()==="")break;numDays++;}

  // Get day-of-week for each day (1-based index → 0-based)
  const dayDOW=[];
  for(let c=1;c<=numDays;c++){
    const raw=String(header[c]||"").trim();
    const letter=(raw.split(/\n|\r/)[1]||"").trim();
    dayDOW.push(letter);
  }

  // Collect employee rows by priority
  const empRows=[];
  for(let r=1;r<calState[tab].length;r++){
    const name=String(calState[tab][r][0]||"").trim();
    if(!name) continue;
    const cfg=cfgMap[name]||{availability:"Disponible",priority:"Titular",turnTypes:"",partialDays:""};
    if(cfg.availability==="No disponible") continue;
    empRows.push({r,name,cfg});
  }

  const titular =empRows.filter(e=>e.cfg.priority==="Titular");
  const sup1    =empRows.filter(e=>e.cfg.priority==="Suplente 1");
  const sup2    =empRows.filter(e=>e.cfg.priority==="Suplente 2");

  // Build shift matrix (copy current state)
  const allEmp=[...titular,...sup1,...sup2];
  const shifts={}; // name → array[numDays]
  const locked={}; // name → array[numDays] bool
  allEmp.forEach(({r,name,cfg})=>{
    const row=[];
    const lck=[];
    for(let c=1;c<=numDays;c++){
      const v=String(calState[tab][r][c]||"").trim().toUpperCase();
      row.push(v);
      lck.push(v!==""); // anything already filled = locked
    }
    // Mark partial unavailable days
    if(cfg.availability==="Disponibilidad parcial"){
      (cfg.partialDays||"").split(",").forEach(s=>{
        const d=parseInt(s.trim())-1;
        if(!isNaN(d)&&d>=0&&d<numDays&&!lck[d]){row[d]="-";lck[d]=true;}
      });
    }
    shifts[name]=row;
    locked[name]=lck;
  });

  // Helper: count how many of a shift type are assigned on a day
  function countDay(d,type){
    return allEmp.filter(e=>shifts[e.name][d]===type).length;
  }

  // Helper: assign a shift to an employee on a day
  function assign(name,d,type){
    shifts[name][d]=type;
    locked[name][d]=true;
  }

  // Helper: check if employee's turnTypes allows a given shift
  function canDo(cfg,type){
    if(!cfg.turnTypes) return true; // no restriction = all allowed
    const allowed=cfg.turnTypes.split(",").map(s=>s.trim());
    return allowed.includes(type);
  }

  // Helper: like canDo but Titulares can never receive N outside their dedicated phase
  // (their 2 consecutive nights are assigned in Phase 1 only)
  function canDoShift(e,type){
    if(type==="N" && e.cfg.priority==="Titular") return false; // titulares get N only in their own phase
    return canDo(e.cfg,type);
  }

  // Helper: get available (unlocked) employees for a day from a list
  function avail(list,d){
    return list.filter(e=>!locked[e.name][d]);
  }

  // ── PHASE 1: Titulares ──
  // Assign M and T to titulares first
  for(let d=0;d<numDays;d++){
    let needM=Math.max(0,covM-countDay(d,"M"));
    let needT=Math.max(0,covT-countDay(d,"T"));
    const pool=avail(titular,d).filter(e=>canDo(e.cfg,"M")||canDo(e.cfg,"T"));
    // shuffle for fairness
    pool.sort(()=>Math.random()-.5);
    pool.forEach(e=>{
      if(needM>0&&canDo(e.cfg,"M")){assign(e.name,d,"M");needM--;}
      else if(needT>0&&canDo(e.cfg,"T")){assign(e.name,d,"T");needT--;}
    });
  }

  // Assign N to titulares: exactly 2 consecutive nights, always.
  // Condition: "N" must be in their turnTypes.
  // If no consecutive pair is available, do NOT assign any night (never single).
  titular.forEach(e=>{
    if(!canDo(e.cfg,"N")) return; // N not available for this titular → skip
    const nCount=shifts[e.name].filter(v=>v==="N").length;
    if(nCount>=2) return; // already has 2 (manually set)
    for(let d=0;d<numDays-1;d++){
      if(!locked[e.name][d]&&!locked[e.name][d+1]&&
         countDay(d,"N")<covN&&countDay(d+1,"N")<covN){
        assign(e.name,d,"N");
        assign(e.name,d+1,"N");
        return; // strictly consecutive, never a single night
      }
    }
    // No consecutive pair available → assign nothing
  });



  // ── PHASE 2: Suplentes 1 ──
  // Fill remaining M, T first
  for(let d=0;d<numDays;d++){
    let needM=Math.max(0,covM-countDay(d,"M"));
    let needT=Math.max(0,covT-countDay(d,"T"));
    const pool=avail(sup1,d);
    pool.sort(()=>Math.random()-.5);
    pool.forEach(e=>{
      if(needM>0&&canDo(e.cfg,"M")){assign(e.name,d,"M");needM--;}
      else if(needT>0&&canDo(e.cfg,"T")){assign(e.name,d,"T");needT--;}
    });
  }
  // Assign RM and RT to suplentes1
  for(let d=0;d<numDays;d++){
    let needRM=Math.max(0,covRM-countDay(d,"RM"));
    let needRT=Math.max(0,covRT-countDay(d,"RT"));
    const pool=avail(sup1,d);
    pool.sort(()=>Math.random()-.5);
    pool.forEach(e=>{
      if(needRM>0&&canDo(e.cfg,"RM")){assign(e.name,d,"RM");needRM--;}
      else if(needRT>0&&canDo(e.cfg,"RT")){assign(e.name,d,"RT");needRT--;}
    });
  }
  // N for suplentes1 (no limit, no consecutive requirement)
  for(let d=0;d<numDays;d++){
    let needN=Math.max(0,covN-countDay(d,"N"));
    const pool=avail(sup1,d).filter(e=>canDo(e.cfg,"N")); // sup1 only, canDo is fine here
    pool.sort(()=>Math.random()-.5);
    pool.slice(0,needN).forEach(e=>assign(e.name,d,"N"));
  }

  // ── PHASE 3: Suplentes 2 ──
  // Fill any remaining slots. Titulares are excluded from N via canDoShift.
  for(let d=0;d<numDays;d++){
    let needM =Math.max(0,covM -countDay(d,"M"));
    let needT =Math.max(0,covT -countDay(d,"T"));
    let needN =Math.max(0,covN -countDay(d,"N"));
    let needRM=Math.max(0,covRM-countDay(d,"RM"));
    let needRT=Math.max(0,covRT-countDay(d,"RT"));
    const pool=avail(sup2,d);
    pool.sort(()=>Math.random()-.5);
    pool.forEach(e=>{
      if     (needM >0&&canDoShift(e,"M")) {assign(e.name,d,"M"); needM--;}
      else if(needT >0&&canDoShift(e,"T")) {assign(e.name,d,"T"); needT--;}
      else if(needN >0&&canDoShift(e,"N")) {assign(e.name,d,"N"); needN--;}
      else if(needRM>0&&canDoShift(e,"RM")){assign(e.name,d,"RM");needRM--;}
      else if(needRT>0&&canDoShift(e,"RT")){assign(e.name,d,"RT");needRT--;}
    });
  }

  // ── FRANCOS ── 1-2 per week, per employee
  // Build week map: weekIndex → [day indices]
  const weekMap=[];
  let wIdx=0;
  weekMap.push([]);
  for(let d=0;d<numDays;d++){
    if(d>0&&dayDOW[d]==="L"){ wIdx++; weekMap.push([]); }
    weekMap[wIdx].push(d);
  }
  const numWeeks=weekMap.length;

  // For Titulares and Suplentes 1: assign 1-2 francos per week from unlocked empty cells
  [...titular,...sup1].forEach(e=>{
    const existingF=shifts[e.name].filter(v=>v==="F").length;
    // Target: Titulares ~8, Sup1 ~9 — but enforce via weekly 1-2 rhythm
    const maxPerMonth=e.cfg.priority==="Titular"?9:11;
    let totalF=existingF;

    weekMap.forEach(weekDays=>{
      if(totalF>=maxPerMonth) return;
      // Unlocked empty cells this week
      const free=weekDays.filter(d=>!locked[e.name][d]&&shifts[e.name][d]==="");
      if(free.length===0) return;
      // Assign 1 or 2 francos this week (prefer 1, allow 2 if week is long enough)
      const toAssign=free.length>=4?2:1; // 2 only if week has 4+ free days
      const capped=Math.min(toAssign, maxPerMonth-totalF, free.length);
      // Pick evenly spaced days within the week
      if(capped>=1){ assign(e.name,free[0],"F"); totalF++; }
      if(capped>=2){ assign(e.name,free[Math.floor(free.length/2)],"F"); totalF++; }
    });
  });

  // Sup2: mark all remaining empty as "-"
  sup2.forEach(e=>{
    for(let d=0;d<numDays;d++){
      if(!locked[e.name][d]&&shifts[e.name][d]==="") assign(e.name,d,"-");
    }
  });

  // Write back
  allEmp.forEach(({r,name})=>{
    for(let c=1;c<=numDays;c++) calState[tab][r][c]=shifts[name][c-1];
  });

  render(tab);
  setStatus(tab,"✓ Turnos distribuidos","badge-ok");
}

/* ── SAVE CALENDAR ── */
function doSave(tab){
  syncTable(tab);
  if(!calState[tab]){setStatus(tab,"Sin datos","badge-err");return;}
  setStatus(tab,"⏳ Guardando...","");
  const payload=encodeURIComponent(JSON.stringify(calState[tab]));
  jsonp({action:"save",tab,payload},json=>{
    if(json.error){setStatus(tab,"✗ "+json.error,"badge-err");return;}
    setStatus(tab,"✓ Guardado en Sheets","badge-ok");
  });
}

/* ── SAVE CONFIG ── */
function readCfgFromDOM(tab){
  const result=[];
  getNames(tab).forEach(name=>{
    const key=name.replace(/\s/g,"_");
    const avail=document.querySelector(`.cfg-avail[data-name="${name}"][data-tab="${tab}"]`)?.value||"Disponible";
    const partial=document.querySelector(`.cfg-partial[data-name="${name}"][data-tab="${tab}"]`)?.value||"";
    const prio=document.querySelector(`.cfg-prio[data-name="${name}"][data-tab="${tab}"]`)?.value||"Titular";
    const chks=[...document.querySelectorAll(`.chk-turn[data-name="${name}"][data-tab="${tab}"]:checked`)].map(c=>c.value);
    result.push({name,availability:avail,partialDays:partial,priority:prio,turnTypes:chks.join(",")});
  });
  return result;
}

function saveCfg(tab){
  const cfg=readCfgFromDOM(tab);
  cfgState[tab]=cfg;
  const s=document.getElementById("cfg-status-"+tab);
  if(s) s.innerHTML='<span class="badge">⏳ Guardando...</span>';
  const payload=encodeURIComponent(JSON.stringify(cfg));
  jsonp({action:"saveConfig",tab,payload},json=>{
    if(!s) return;
    s.innerHTML=json.error
      ?`<span class="badge badge-err">✗ ${esc(json.error)}</span>`
      :'<span class="badge badge-ok">✓ Guardado</span>';
  });
}

/* ── HELPERS ── */
function getNames(tab){
  const names=[];
  if(!calState[tab]) return names;
  for(let r=1;r<calState[tab].length;r++){
    const n=String(calState[tab][r][0]||"").trim();
    if(n) names.push(n);
  }
  return names;
}
function syncTable(tab){
  document.querySelectorAll(`#tab-${tab} [data-tab="${tab}"][data-r]`).forEach(el=>{
    const r=parseInt(el.dataset.r),c=parseInt(el.dataset.c);
    ensureCell(tab,r,c);
    let v=el.innerText.trim();
    if(r>0&&c>0) v=v.toUpperCase();
    calState[tab][r][c]=v;
  });
}
function setStatus(tab,msg,cls){
  const el=document.getElementById("status-"+tab);
  if(el) el.innerHTML=`<span class="badge ${cls}">${msg}</span>`;
}
function selAll(el){
  const range=document.createRange();range.selectNodeContents(el);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
}
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

loadTab("current");
