<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendario de Turnos</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f3ef;--surface:#fff;--border:#e0ddd4;
      --text:#1a1a18;--muted:#6b6860;
      --accent:#185FA5;--accent-light:#E6F1FB;--accent-mid:#B5D4F4;
      --header-bg:#185FA5;--header-text:#fff;
      --row-alt:#f9f8f5;--shadow:0 1px 4px rgba(0,0,0,.08);
      --green:#1a7a3a;--green-light:#e6f5ec;
      --orange:#b55a00;--orange-light:#fff3e6;
    }
    body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh}
    header{background:var(--header-bg);color:var(--header-text);padding:1.2rem 2rem .9rem;display:flex;align-items:flex-end;gap:1rem}
    header h1{font-size:1.4rem;font-weight:normal;letter-spacing:.04em}
    header span{font-size:.82rem;opacity:.7;font-family:'Courier New',monospace;padding-bottom:2px}
    .tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 2rem}
    .tab-btn{padding:.8rem 1.4rem;border:none;background:#eae8e3;color:var(--muted);font-family:'Courier New',monospace;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-right:1px solid var(--border);border-top:3px solid transparent;transition:background .15s,color .15s;position:relative;top:1px}
    .tab-btn:first-child{border-left:1px solid var(--border)}
    .tab-btn.active{background:#fff;color:var(--accent);border-top:3px solid var(--accent);font-weight:bold}
    .tab-btn:hover:not(.active){background:#ddd;color:var(--text)}
    .tab-content{display:none;padding:1.2rem 2rem 3rem}
    .tab-content.active{display:block}

    /* toolbar */
    .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.6rem;margin-bottom:1rem}
    .toolbar label{font-family:'Courier New',monospace;font-size:.78rem;color:var(--muted)}
    .toolbar select,.toolbar input[type=number]{
      font-family:'Courier New',monospace;font-size:.8rem;
      padding:.3rem .5rem;border:1px solid var(--border);border-radius:4px;
      background:#fff;color:var(--text);cursor:pointer
    }
    .btn{display:inline-flex;align-items:center;gap:.35rem;padding:.38rem .9rem;border:none;border-radius:4px;font-family:'Courier New',monospace;font-size:.78rem;letter-spacing:.04em;cursor:pointer;transition:opacity .15s,transform .1s}
    .btn:active{transform:scale(.97)}
    .btn-init{background:var(--accent);color:#fff}
    .btn-init:hover{opacity:.88}
    .btn-save{background:var(--green);color:#fff}
    .btn-save:hover{opacity:.88}
    .btn-add{background:var(--orange);color:#fff}
    .btn-add:hover{opacity:.88}
    .badge{display:inline-block;padding:.15rem .45rem;border-radius:3px;font-size:.7rem;font-family:'Courier New',monospace;margin-left:.4rem}
    .badge-ok{background:var(--green-light);color:var(--green)}
    .badge-err{background:#fde8e8;color:#a32d2d}

    /* table */
    .table-wrapper{overflow-x:auto;border-radius:6px;box-shadow:var(--shadow);border:1px solid var(--border)}
    table{border-collapse:collapse;min-width:100%;background:var(--surface);font-size:.8rem}
    thead tr th{background:var(--header-bg);color:var(--header-text);padding:.45rem .5rem;text-align:center;font-family:'Courier New',monospace;font-weight:normal;letter-spacing:.04em;border-right:1px solid rgba(255,255,255,.15);white-space:nowrap;min-width:36px}
    thead tr th:first-child{text-align:left;min-width:160px;padding-left:.8rem}
    tbody tr td{padding:.35rem .45rem;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);white-space:nowrap}
    tbody tr td:first-child{text-align:left;font-family:'Courier New',monospace;font-size:.78rem;padding-left:.8rem;font-weight:bold;background:#f0efe9;position:sticky;left:0;z-index:1;border-right:2px solid var(--border)}
    tbody tr:nth-child(even){background:var(--row-alt)}
    tbody tr:hover td{background:var(--accent-light)}
    tbody tr:hover td:first-child{background:var(--accent-mid)}

    /* editable cells */
    td[contenteditable="true"]{outline:none;cursor:text}
    td[contenteditable="true"]:focus{background:#fffbe6!important;outline:2px solid #f0c040;outline-offset:-2px}
    th[contenteditable="true"]{outline:none;cursor:text}
    th[contenteditable="true"]:focus{background:#1045a0!important;outline:2px solid #f0c040;outline-offset:-2px}

    .day-header{display:flex;flex-direction:column;align-items:center;line-height:1.3}
    .day-num{font-size:.82rem;font-weight:bold}
    .day-letter{font-size:.67rem;opacity:.78}

    .loading,.error{padding:3rem 2rem;text-align:center;font-family:'Courier New',monospace;font-size:.88rem;color:var(--muted)}
    .error{color:#a32d2d}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--accent-mid);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .add-row-row td{background:#f5f4ef;text-align:center!important;padding:.2rem}
    .btn-add-row{background:none;border:1px dashed #bbb;border-radius:3px;color:var(--muted);font-size:.75rem;font-family:'Courier New',monospace;padding:.2rem .7rem;cursor:pointer;width:100%}
    .btn-add-row:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}

    @media(max-width:600px){
      header{padding:.8rem}
      .tabs-bar{padding:0 .8rem}
      .tab-content{padding:.8rem .4rem 2rem}
      .tab-btn{padding:.6rem .7rem;font-size:.7rem}
      .toolbar{gap:.4rem}
    }
  </style>
</head>
<body>

<header>
  <h1>Calendario de Turnos</h1>
  <span>gestión de personal</span>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('current',this)">Mes en curso</button>
  <button class="tab-btn"        onclick="switchTab('next',this)">Mes entrante</button>
</div>

<div id="tab-current" class="tab-content active"></div>
<div id="tab-next"    class="tab-content"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzP-qBzVytXwMXTU67z8i4MFUYENUvtVOgoBicXOv-b1-zGi4QgvoKj9gdu_jHJZEhg/exec";
const MESES = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
const DIAS  = ["D","L","MA","MI","J","V","S"];

let state = { current: null, next: null };
let cbN = 0;

/* ── JSONP helper ── */
function jsonp(params, cb) {
  const name = "__cb" + (++cbN);
  const qs   = Object.entries(params).map(([k,v])=>k+"="+encodeURIComponent(v)).join("&");
  const to   = setTimeout(()=>{ cb({error:"Timeout"}); delete window[name]; }, 20000);
  window[name] = d => { clearTimeout(to); delete window[name]; cb(d); };
  const s = document.createElement("script");
  s.src = API + "?" + qs + "&callback=" + name;
  s.onerror = () => { clearTimeout(to); cb({error:"Error de red"}); delete window[name]; };
  document.head.appendChild(s);
}

/* ── tabs ── */
const loaded = {};
function switchTab(tab, btn) {
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
  if (!loaded[tab]) loadTab(tab);
}

function loadTab(tab) {
  loaded[tab] = true;
  setHtml(tab, '<div class="loading"><span class="spinner"></span>Cargando...</div>');
  jsonp({action:"read", tab}, json => {
    if (json.error) { setHtml(tab, '<div class="error">'+esc(json.error)+'</div>'); return; }
    state[tab] = json.data;
    render(tab);
  });
}

function setHtml(tab, html) {
  document.getElementById("tab-"+tab).innerHTML = html;
}

/* ── render ── */
function render(tab) {
  const container = document.getElementById("tab-"+tab);
  const now = new Date();
  const defYear  = now.getFullYear();
  const defMonth = tab === "next" ? (now.getMonth()+1) % 12 : now.getMonth();
  const defYearNext = tab === "next" && now.getMonth()===11 ? defYear+1 : defYear;

  let html = `<div class="toolbar">
    <label>Mes:</label>
    <select id="sel-month-${tab}">
      ${MESES.map((m,i)=>`<option value="${i}" ${i===(tab==="next"?defMonth:defMonth)?"selected":""}>${m}</option>`).join("")}
    </select>
    <label>Año:</label>
    <input type="number" id="sel-year-${tab}" value="${tab==="next"?defYearNext:defYear}" min="2020" max="2099" style="width:70px">
    <button class="btn btn-init" onclick="initMonth('${tab}')">⚙ Generar mes</button>
    <button class="btn btn-save" onclick="saveTab('${tab}')">💾 Guardar cambios</button>
    <span id="status-${tab}"></span>
  </div>`;

  html += buildTable(tab, state[tab]);
  container.innerHTML = html;
}

function buildTable(tab, rows) {
  if (!rows || rows.length === 0) return '<div class="error">Sin datos. Usá "Generar mes" para inicializar.</div>';

  const header = rows[0];
  const monthYear = String(header[0]||"").trim();

  // Detectar columnas de días
  let numDays = 0;
  for (let c = 1; c < header.length; c++) {
    if (String(header[c]||"").trim() === "") break;
    numDays++;
  }

  let t = `<div class="table-wrapper"><table>`;

  // THEAD — mes/año editable, días editables
  t += `<thead><tr>`;
  t += `<th contenteditable="true" data-tab="${tab}" data-r="0" data-c="0" onblur="cellEdit(this)">${esc(monthYear)}</th>`;
  for (let c = 1; c <= numDays; c++) {
    const raw = String(header[c]||"").trim();
    const parts = raw.split(/\n|\r/);
    const num = parts[0]||"";
    const letter = parts[1]||"";
    t += `<th contenteditable="true" data-tab="${tab}" data-r="0" data-c="${c}" onblur="cellEdit(this)">
      <div class="day-header">
        <span class="day-num">${esc(num)}</span>
        ${letter ? `<span class="day-letter">${esc(letter)}</span>` : ""}
      </div>
    </th>`;
  }
  t += `</tr></thead><tbody>`;

  // TBODY — empleados
  for (let r = 1; r < rows.length; r++) {
    const name = String(rows[r][0]||"").trim();
    if (name === "" && rows[r].slice(1).every(v=>String(v).trim()==="")) continue;
    t += `<tr>`;
    t += `<td contenteditable="true" data-tab="${tab}" data-r="${r}" data-c="0" onblur="cellEdit(this)">${esc(name)}</td>`;
    for (let c = 1; c <= numDays; c++) {
      const val = String(rows[r][c]!==undefined ? rows[r][c] : "").trim();
      t += `<td contenteditable="true" data-tab="${tab}" data-r="${r}" data-c="${c}" onblur="cellEdit(this)">${esc(val)}</td>`;
    }
    t += `</tr>`;
  }

  // Fila para agregar empleado
  t += `<tr class="add-row-row"><td colspan="${numDays+1}">
    <button class="btn-add-row" onclick="addEmployee('${tab}')">+ Agregar empleado</button>
  </td></tr>`;

  t += `</tbody></table></div>`;
  return t;
}

/* ── edición inline ── */
function cellEdit(el) {
  const tab = el.dataset.tab;
  const r   = parseInt(el.dataset.r);
  const c   = parseInt(el.dataset.c);
  // Extraer texto plano del contenteditable (puede tener spans dentro)
  let val = el.innerText.trim();
  if (!state[tab]) return;
  while (state[tab].length <= r) state[tab].push([]);
  while (state[tab][r].length <= c) state[tab][r].push("");
  state[tab][r][c] = val;
}

function addEmployee(tab) {
  if (!state[tab] || state[tab].length === 0) return;
  const numCols = state[tab][0].length;
  const newRow = new Array(numCols).fill("");
  newRow[0] = "Nuevo empleado";
  state[tab].push(newRow);
  render(tab);
  // Scroll al final de la tabla y focus en el nombre
  const tds = document.querySelectorAll(`#tab-${tab} tbody tr:not(.add-row-row):last-child td`);
  if (tds[0]) { tds[0].focus(); selectAll(tds[0]); }
}

function selectAll(el) {
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

/* ── generar mes ── */
function initMonth(tab) {
  const month = parseInt(document.getElementById("sel-month-"+tab).value);
  const year  = parseInt(document.getElementById("sel-year-"+tab).value);
  setStatus(tab, "⏳ Generando...", "");
  jsonp({ action:"initMonth", tab, month, year }, json => {
    if (json.error) { setStatus(tab, "✗ "+json.error, "badge-err"); return; }
    state[tab] = json.data;
    render(tab);
    setStatus(tab, "✓ Mes generado", "badge-ok");
  });
}

/* ── guardar ── */
function saveTab(tab) {
  if (!state[tab]) return;
  setStatus(tab, "⏳ Guardando...", "");

  // Leer estado actual de la tabla (por si el usuario editó sin disparar blur)
  syncTableToState(tab);

  const payload = encodeURIComponent(JSON.stringify(state[tab]));
  jsonp({ action:"save", tab, payload }, json => {
    if (json.error) { setStatus(tab, "✗ "+json.error, "badge-err"); return; }
    setStatus(tab, "✓ Guardado en Sheets", "badge-ok");
  });
}

function syncTableToState(tab) {
  document.querySelectorAll(`#tab-${tab} [data-tab="${tab}"]`).forEach(el => {
    const r = parseInt(el.dataset.r);
    const c = parseInt(el.dataset.c);
    if (!state[tab]) return;
    while (state[tab].length <= r) state[tab].push([]);
    while (state[tab][r].length <= c) state[tab][r].push("");
    state[tab][r][c] = el.innerText.trim();
  });
}

function setStatus(tab, msg, cls) {
  const el = document.getElementById("status-"+tab);
  if (!el) return;
  el.innerHTML = `<span class="badge ${cls}">${msg}</span>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ── init ── */
loadTab("current");
</script>
</body>
</html>
