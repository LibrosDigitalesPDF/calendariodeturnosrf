<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma - Residencial Francia</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Gestión de Personal - Cronograma</h1>
        <nav id="tabs">
            <button class="tab-btn active" data-target="vencido">Mes vencido</button>
            <button class="tab-btn" data-target="curso">Mes en curso</button>
            <button class="tab-btn" data-target="entrante">Mes entrante</button>
            <button class="tab-btn" data-target="historico">Archivo Histórico</button>
        </nav>
    </header>

    <main>
        <div id="vencido" class="tab-content active">
            <div class="table-container" id="table-vencido"></div>
        </div>

        <div id="curso" class="tab-content">
            <div class="toolbar">
                <button onclick="app.initMonth('curso')">Inicializar Mes</button>
                <button onclick="app.autoComplete('curso')">Completar Automáticamente</button>
                <button onclick="app.clearSchedule('curso')">Vaciar Cronograma</button>
                <button onclick="app.saveData('curso')" class="btn-primary">Guardar Cambios</button>
            </div>
            <div class="table-container" id="table-curso"></div>
            <div id="panel-curso" class="config-panel"></div>
        </div>

        <div id="entrante" class="tab-content">
            <div class="toolbar">
                <button onclick="app.initMonth('entrante')">Inicializar Mes</button>
                <button onclick="app.autoComplete('entrante')">Completar Automáticamente</button>
                <button onclick="app.clearSchedule('entrante')">Vaciar Cronograma</button>
                <button onclick="app.saveData('entrante')" class="btn-primary">Guardar Cambios</button>
            </div>
            <div class="table-container" id="table-entrante"></div>
            <div id="panel-entrante" class="config-panel"></div>
        </div>

        <div id="historico" class="tab-content">
            <div id="history-container" class="history-grid"></div>
        </div>
    </main>

    <div id="modal-alert" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">Alerta</h3>
            <p id="modal-message"></p>
            <button onclick="app.closeModal()">Cerrar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
