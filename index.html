<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario de Turnos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f3ef;
      --surface: #ffffff;
      --border: #e0ddd4;
      --text-primary: #1a1a18;
      --text-secondary: #6b6860;
      --accent: #185FA5;
      --accent-light: #E6F1FB;
      --accent-mid: #B5D4F4;
      --tab-active-bg: #ffffff;
      --tab-inactive-bg: #eae8e3;
      --header-bg: #185FA5;
      --header-text: #ffffff;
      --row-alt: #f9f8f5;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
    }

    header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1.5rem 2rem 1rem;
      display: flex;
      align-items: flex-end;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.04em;
      font-family: 'Georgia', serif;
    }

    header span.subtitle {
      font-size: 0.85rem;
      opacity: 0.7;
      font-family: 'Courier New', monospace;
      padding-bottom: 2px;
    }

    .tabs-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      padding: 0 2rem;
      gap: 0;
    }

    .tab-btn {
      padding: 0.85rem 1.5rem;
      border: none;
      background: var(--tab-inactive-bg);
      color: var(--text-secondary);
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border-right: 1px solid var(--border);
      border-top: 3px solid transparent;
      transition: background 0.15s, color 0.15s;
      position: relative;
      top: 1px;
    }

    .tab-btn:first-child { border-left: 1px solid var(--border); }

    .tab-btn.active {
      background: var(--tab-active-bg);
      color: var(--accent);
      border-top: 3px solid var(--accent);
      font-weight: bold;
    }

    .tab-btn:hover:not(.active) {
      background: #ddd;
      color: var(--text-primary);
    }

    .tab-content {
      display: none;
      padding: 1.5rem 2rem 3rem;
    }

    .tab-content.active { display: block; }

    .calendar-title {
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 6px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    table {
      border-collapse: collapse;
      min-width: 100%;
      background: var(--surface);
      font-size: 0.82rem;
    }

    thead tr th {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.5rem 0.6rem;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-weight: normal;
      letter-spacing: 0.04em;
      border-right: 1px solid rgba(255,255,255,0.15);
      white-space: nowrap;
      min-width: 38px;
    }

    thead tr th:first-child {
      text-align: left;
      min-width: 160px;
      padding-left: 1rem;
      letter-spacing: 0.08em;
    }

    tbody tr td {
      padding: 0.45rem 0.6rem;
      text-align: center;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr td:first-child {
      text-align: left;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding-left: 1rem;
      color: var(--text-primary);
      font-weight: bold;
      background: #f0efe9;
      position: sticky;
      left: 0;
      z-index: 1;
      border-right: 2px solid var(--border);
    }

    tbody tr:nth-child(even) { background: var(--row-alt); }

    tbody tr:hover td { background: var(--accent-light); }
    tbody tr:hover td:first-child { background: var(--accent-mid); }

    .day-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.3;
    }

    .day-num {
      font-size: 0.85rem;
      font-weight: bold;
    }

    .day-letter {
      font-size: 0.7rem;
      opacity: 0.75;
    }

    .loading, .error {
      padding: 3rem 2rem;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .error { color: #a32d2d; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--accent-mid);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      header { padding: 1rem; }
      .tabs-bar { padding: 0 1rem; }
      .tab-content { padding: 1rem 0.5rem 2rem; }
      .tab-btn { padding: 0.7rem 0.8rem; font-size: 0.72rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Calendario de Turnos</h1>
  <span class="subtitle">gestión de personal</span>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('current', this)">Mes en curso</button>
  <button class="tab-btn" onclick="switchTab('next', this)">Mes entrante</button>
</div>

<div id="tab-current" class="tab-content active">
  <div class="loading"><span class="spinner"></span>Cargando calendario...</div>
</div>

<div id="tab-next" class="tab-content">
  <div class="loading"><span class="spinner"></span>Cargando calendario...</div>
</div>

<script>
  // =====================================================
  // REEMPLAZÁ ESTA URL CON LA DE TU APPS SCRIPT PUBLICADO
  // =====================================================
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzP-qBzVytXwMXTU67z8i4MFUYENUvtVOgoBicXOv-b1-zGi4QgvoKj9gdu_jHJZEhg/exec
";
  // =====================================================

  const cache = {};
  let loadedTabs = {};

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (!loadedTabs[tab]) loadCalendar(tab);
  }

  function loadCalendar(tab) {
    loadedTabs[tab] = true;
    const container = document.getElementById('tab-' + tab);
    container.innerHTML = '<div class="loading"><span class="spinner"></span>Cargando calendario...</div>';

    const url = APPS_SCRIPT_URL + "?tab=" + tab;

    fetch(url)
      .then(r => r.json())
      .then(json => {
        if (json.error) throw new Error(json.error);
        renderCalendar(container, json);
      })
      .catch(err => {
        container.innerHTML = '<div class="error">Error al cargar los datos: ' + err.message + '</div>';
      });
  }

  function renderCalendar(container, json) {
    const rows = json.data;
    if (!rows || rows.length < 2) {
      container.innerHTML = '<div class="error">Sin datos en la hoja.</div>';
      return;
    }

    // Fila 0: [nombre mes+año, dia1, dia2, ...]
    const headerRow = rows[0];
    const monthYearRaw = String(headerRow[0] || "").trim();

    // Detectar cuántas columnas de días hay
    // Las columnas de día empiezan en índice 1
    // Cada celda de día puede ser "01\nL" o sólo "01" o un número
    const dayHeaders = [];
    for (let c = 1; c < headerRow.length; c++) {
      const val = String(headerRow[c] || "").trim();
      if (val === "") break;
      dayHeaders.push(val);
    }

    // Filas de empleados: desde fila 1 en adelante
    const employees = [];
    for (let r = 1; r < rows.length; r++) {
      const name = String(rows[r][0] || "").trim();
      if (name === "") continue;
      const shifts = [];
      for (let c = 1; c <= dayHeaders.length; c++) {
        shifts.push(String(rows[r][c] !== undefined ? rows[r][c] : "").trim());
      }
      employees.push({ name, shifts });
    }

    // Parsear encabezados de días: pueden tener salto de línea "01\nL" o ser sólo número
    const parsedDays = dayHeaders.map(d => {
      const parts = d.split(/\n|\r/);
      return {
        num: parts[0] ? String(parts[0]).padStart(2, '0') : d,
        letter: parts[1] || getDayLetter(parts[0])
      };
    });

    // Construir tabla
    let html = '<div class="calendar-title">' + escapeHtml(monthYearRaw) + '</div>';
    html += '<div class="table-wrapper"><table>';

    // THEAD
    html += '<thead><tr><th>' + escapeHtml(monthYearRaw) + '</th>';
    parsedDays.forEach(d => {
      html += '<th><div class="day-header"><span class="day-num">' + escapeHtml(d.num) + '</span><span class="day-letter">' + escapeHtml(d.letter) + '</span></div></th>';
    });
    html += '</tr></thead>';

    // TBODY
    html += '<tbody>';
    employees.forEach(emp => {
      html += '<tr><td>' + escapeHtml(emp.name) + '</td>';
      emp.shifts.forEach(s => {
        html += '<td>' + escapeHtml(s) + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';

    container.innerHTML = html;
  }

  // Fallback: calcula la letra del día desde un número de día y el mes actual
  // Sólo se usa si la celda del sheet no incluye la letra
  function getDayLetter(dayNum) {
    // No podemos saber el mes sin más contexto, devolvemos vacío
    return "";
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Cargar pestaña inicial
  loadCalendar('current');
</script>
</body>
</html>
